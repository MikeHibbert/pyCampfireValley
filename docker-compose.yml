version: '3.8'

services:
  campfire-valley:
    build:
      context: .
      dockerfile: ./Dockerfile
      args:
        USE_LOCAL_CAMPFIRES: "false"
        USE_GIT_CAMPFIRES: "true"
    container_name: campfire-valley-web
    user: "0:0"
    ports:
      - "${PORT:-8000}:8000"  # Web visualization interface (customizable host port)
    environment:
      - CAMPFIRE_VALLEY_ENV=docker
      - CAMPFIRE_VALLEY_HOST=0.0.0.0
      - CAMPFIRE_VALLEY_PORT=8000
      - PYTHONPATH=/app
      - REDIS_URL=redis://redis:6379
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - CONFIG_DIR=/app/data/configs
      - EMBEDDINGS_DIR=/app/data/embeddings
      - LOGS_DIR=/app/data/logs
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
      - ./reports:/app/reports
      - valley_data:/app/persistent_data
      - campfire-configs:/app/data/configs
      - campfire-embeddings:/app/data/embeddings
      - campfire-logs:/app/data/logs
    networks:
      - campfire-network
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  campfire-valley-remote:
    build:
      context: .
      dockerfile: ./Dockerfile
      args:
        USE_LOCAL_CAMPFIRES: "false"
        USE_GIT_CAMPFIRES: "true"
    container_name: campfire-valley-remote
    user: "0:0"
    ports:
      - "8001:8000"
    environment:
      - CAMPFIRE_VALLEY_ENV=docker
      - CAMPFIRE_VALLEY_HOST=0.0.0.0
      - CAMPFIRE_VALLEY_PORT=8000
      - PYTHONPATH=/app
      - REDIS_URL=redis://redis:6379
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - CONFIG_DIR=/app/data/configs
      - EMBEDDINGS_DIR=/app/data/embeddings
      - LOGS_DIR=/app/data/logs
      - VALLEY_NAME=Remote Valley
      - ENABLE_DOCK_ON_START=true
      - DOCK_MODE=public
    volumes:
      - ./config:/app/config:ro
      - valley_data_remote:/app/persistent_data
      - campfire-configs-remote:/app/data/configs
      - campfire-embeddings-remote:/app/data/embeddings
      - campfire-logs-remote:/app/data/logs
    networks:
      - campfire-network
    depends_on:
      - redis
    restart: unless-stopped

  # Optional: Redis for caching and session management
  redis:
    image: redis:7-alpine
    container_name: campfire-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - campfire-network
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: Monitoring with Prometheus metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: campfire-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - campfire-network
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'

volumes:
  valley_data:
    driver: local
  valley_data_remote:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  campfire-configs:
    driver: local
  campfire-embeddings:
    driver: local
  campfire-logs:
    driver: local
  campfire-configs-remote:
    driver: local
  campfire-embeddings-remote:
    driver: local
  campfire-logs-remote:
    driver: local

networks:
  campfire-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
