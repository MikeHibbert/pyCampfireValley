<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampfireValley Visualization</title>
    <link rel="stylesheet" href="/static/css/style.css?v=20260521g">
    <script src="/static/js/litegraph.js"></script>
    <script src="/static/js/gamification.js"></script>
    <script src="/static/js/campfire-nodes.js?v=20260521g"></script>
    <script src="/static/js/litegraph-integration.js?v=20260521g"></script>
    <script src="/static/js/metrics.js?v=20260521g"></script>
    <script src="/static/js/main.js?v=20260521g"></script>
</head>
<body>
    <div class="container">
        <div class="metrics-panel" id="metricsPanel">
            <div class="metrics-header">
                <h3>Campfire Control</h3>
                <button id="toggleMetrics" class="btn-small">Hide</button>
            </div>
            <div class="metrics-content">
                <div class="metric-group">
                    <h4>🏕️ Valley</h4>
                    <div id="valleySummary" class="management-stack"></div>
                </div>
                <div class="metric-group">
                    <h4>🔥 Campfire Performance</h4>
                    <div id="campfireMetrics" class="metrics-grid">
                        <div class="metric-item">
                            <span class="metric-label">Total Requests:</span>
                            <span class="metric-value" id="totalRequests">0</span>
                        </div>
                        <div class="metric-item">
                            <span class="metric-label">Active Connections:</span>
                            <span class="metric-value" id="activeConnections">0</span>
                        </div>
                        <div class="metric-item">
                            <span class="metric-label">Avg Processing Time:</span>
                            <span class="metric-value" id="avgProcessingTime">0ms</span>
                        </div>
                        <div class="metric-item">
                            <span class="metric-label">Error Rate:</span>
                            <span class="metric-value" id="errorRate">0%</span>
                        </div>
                    </div>
                </div>
                <div class="metric-group">
                    <h4>⚡ Campfire Health</h4>
                    <div id="nodeMetrics" class="management-stack"></div>
                </div>
                <div class="metric-group">
                    <h4>🌐 Dock</h4>
                    <div id="dockMetrics" class="management-stack"></div>
                    <div class="dock-controls">
                    <button id="dockEnable" class="btn sidebar-btn">Enable Dock</button>
                    <select id="dockMode" class="btn sidebar-select">
                        <option value="private">Private</option>
                        <option value="partial">Partial</option>
                        <option value="public">Public</option>
                    </select>
                    <button id="dockBroadcast" class="btn sidebar-btn">Broadcast Discovery</button>
                    </div>
                    <div class="metric-subhead">Discovered Valleys</div>
                    <div id="dockValleys" class="management-stack"></div>
                </div>
            </div>
        </div>
        <div class="litegraph-container">
            <div class="litegraph-header">
                <h2>🏕️ CampfireValley </h2>
                <div class="litegraph-controls">
                    <button id="resetLayout" class="btn">🔄 Reset Layout</button>
                    <button id="saveLayout" class="btn">💾 Save Layout</button>
                    <button id="loadLayout" class="btn">📁 Load Layout</button>
                    <button id="saveValley" class="btn">💾 Save Valley</button>
                    <button id="loadValley" class="btn">📁 Load Valley</button>
                    <button id="importCampfire" class="btn">📥 Import Campfire</button>
                </div>
            </div>
            <div id="chatPanel" class="chat-panel hidden">
                <div class="chat-header">
                    <div id="chatTitle" class="chat-title"></div>
                    <button id="chatClose" class="chat-close" type="button">✕</button>
                </div>
                <div id="chatMessages" class="chat-messages"></div>
                <div id="chatLogsPanel" class="chat-logs hidden"></div>
                <div class="chat-input-row">
                    <button id="chatMic" class="chat-mic" type="button">🎙️</button>
                    <input id="chatInput" class="chat-input" type="text" placeholder="Message this node..." autocomplete="off" />
                    <button id="chatSend" class="chat-send" type="button">Send</button>
                </div>
            </div>
            <div id="chatActionBar" class="chat-action-bar hidden">
                <button id="chatFreeze" class="chat-freeze" type="button">🔒 Freeze Beliefs</button>
                <button id="chatClearBeliefs" class="chat-freeze" type="button">🧹 Clear Beliefs</button>
                <button id="chatLogs" class="chat-freeze" type="button">📜 Logs</button>
                <button id="chatExport" class="chat-freeze" type="button">⬇ Export</button>
                <button id="chatSpeak" class="chat-freeze" type="button">🔊 Speak: On</button>
                <button id="chatStopSpeak" class="chat-freeze" type="button">⏹️ Stop Audio</button>
                <button id="chatTools" class="chat-freeze" type="button">🧰 Tools</button>
                <button id="chatRounds" class="chat-freeze" type="button">🔁 Rounds</button>
            </div>
            <canvas id="litegraphCanvas" class="litegraph-canvas"></canvas>
        </div>
    </div>
</body>
</html>
